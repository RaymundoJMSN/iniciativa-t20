name: Deploy to devilsworks

# Deploy automático seguro: primeiro BUILDA no runner (portão). Se o build
# falhar (ex.: erro de LESS no tema), o job para e o SERVIDOR NÃO É TOCADO —
# produção continua no último estado bom. Só deploya se o build passar.

on:
  push:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build gate (compila tudo, incl. temas/LESS)
        # npm install (nao ci): o lockfile do upstream homebrewery esta
        # dessincronizado; npm ci e estrito e falha. install builda igual ao server.
        run: npm install --no-audit --no-fund

      - name: Deploy via SSH (só roda se o build passou)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            set -e
            cd /home/ubuntu/iniciativa-t20
            echo "== atualizando código =="
            git fetch --all --quiet
            git reset --hard origin/master
            echo "== limpa build/ (evita artefatos de temas/assets removidos) =="
            rm -rf build
            echo "== deps + build (postinstall) =="
            npm install --no-audit --no-fund
            echo "== reiniciando app =="
            pm2 restart iniciativa-t20 --update-env
            pm2 save
            echo "== deploy OK: $(git rev-parse --short HEAD) =="
